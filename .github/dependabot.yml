# Dependabot version updates. Docs:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # NuGet packages (central package management in Directory.Packages.props)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # The Avalonia packages must move in lockstep; partial bumps leave a
      # mixed-version tree that fails at runtime (see closed PRs #6-#9).
      avalonia:
        patterns:
          - "Avalonia*"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # .NET SDK pinned in global.json
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
