name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    # macOS runner: codesign is needed to ad-hoc sign the osx binaries —
    # macOS SIGKILLs unsigned arm64 executables on launch. Any host can
    # cross-publish the other RIDs.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Test
        run: ./ci.sh
      - name: Publish all targets
        run: ./publish.sh
      - name: Sign macOS binaries (ad-hoc)
        run: |
          for rid in osx-x64 osx-arm64; do
            codesign --force -s - "artifacts/$rid/flashkit-md"
            codesign --verify "artifacts/$rid/flashkit-md"
          done
      - name: Package
        run: |
          mkdir -p dist
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            tar -C "artifacts/$rid" -czf "dist/flashkit-md-$GITHUB_REF_NAME-$rid.tar.gz" flashkit-md
          done
          (cd artifacts/win-x64 && zip -q "$GITHUB_WORKSPACE/dist/flashkit-md-$GITHUB_REF_NAME-win-x64.zip" flashkit-md.exe)
          (cd dist && shasum -a 256 * > SHA256SUMS)
      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## "ver" " {found=1; next}
            /^## / && found {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "CHANGELOG.md has no section for $version — add one before tagging"
            exit 1
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file release-notes.md
