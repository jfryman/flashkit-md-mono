name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    # macOS runner: codesign/notarytool only exist on macOS, and macOS
    # SIGKILLs unsigned arm64 executables on launch. Any host can
    # cross-publish the other RIDs; Windows binaries are Authenticode-
    # signed with osslsigncode.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Test
        run: ./ci.sh
      - name: Publish all targets
        run: VERSION="${GITHUB_REF_NAME#v}" ./publish.sh
      - name: Sign macOS binaries and app bundles
        # With MACOS_CERT_P12_BASE64 set: Developer ID signing with the
        # hardened runtime (required for notarization). Without: ad-hoc,
        # as before — Gatekeeper then needs right-click → Open. See
        # docs/RELEASING.md.
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -n "$MACOS_CERT_P12_BASE64" ]; then
            security create-keychain -p ci build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p ci build.keychain
            security set-keychain-settings -lut 21600 build.keychain
            echo "$MACOS_CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
            security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
            rm /tmp/cert.p12
            security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain >/dev/null
            identity=$(security find-identity -v -p codesigning build.keychain | awk 'NR==1 {print $2}')
            [ -n "$identity" ] || { echo "certificate import failed"; exit 1; }
            echo "signing with Developer ID identity $identity"
            sign() {
              codesign --force --options runtime --timestamp \
                --entitlements packaging/macos/entitlements.plist -s "$identity" "$1"
            }
          else
            echo "MACOS_CERT_P12_BASE64 not set — ad-hoc signing (Gatekeeper will warn on first launch)"
            sign() { codesign --force -s - "$1"; }
          fi
          for rid in osx-x64 osx-arm64; do
            for bin in flashkit-md flashkit-md-gui; do
              sign "artifacts/$rid/$bin"
              codesign --verify "artifacts/$rid/$bin"
            done
            sign "artifacts/$rid/FlashKit MD.app"
            codesign --verify "artifacts/$rid/FlashKit MD.app"
          done
      - name: Notarize and staple macOS artifacts
        # Needs the Developer ID signing above plus notarization secrets.
        # The .app bundles get stapled tickets (offline Gatekeeper pass);
        # bare CLI binaries cannot be stapled, but notarizing them lets
        # Gatekeeper verify them online.
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12_BASE64" ] || [ -z "$APPLE_ID" ]; then
            echo "notarization secrets not set — skipping (first launch will need right-click → Open)"
            exit 0
          fi
          for rid in osx-x64 osx-arm64; do
            ditto -c -k --keepParent "artifacts/$rid/FlashKit MD.app" "/tmp/notarize-app-$rid.zip"
            xcrun notarytool submit "/tmp/notarize-app-$rid.zip" --wait \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD"
            xcrun stapler staple "artifacts/$rid/FlashKit MD.app"
            zip -j "/tmp/notarize-cli-$rid.zip" "artifacts/$rid/flashkit-md" "artifacts/$rid/flashkit-md-gui"
            xcrun notarytool submit "/tmp/notarize-cli-$rid.zip" --wait \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD"
          done
      - name: Sign Windows binaries (Authenticode)
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_CERT_PFX_BASE64" ]; then
            echo "WINDOWS_CERT_PFX_BASE64 not set — shipping unsigned exes (SmartScreen will warn)"
            exit 0
          fi
          brew install --quiet osslsigncode
          echo "$WINDOWS_CERT_PFX_BASE64" | base64 --decode > /tmp/win.pfx
          for exe in flashkit-md flashkit-md-gui; do
            osslsigncode sign -pkcs12 /tmp/win.pfx -pass "$WINDOWS_CERT_PASSWORD" \
              -n "FlashKit MD" -i "https://github.com/jfryman/flashkit-md-dotnet" \
              -t "http://timestamp.digicert.com" \
              -in "artifacts/win-x64/$exe.exe" -out "artifacts/win-x64/$exe.signed.exe"
            mv "artifacts/win-x64/$exe.signed.exe" "artifacts/win-x64/$exe.exe"
          done
          rm /tmp/win.pfx
      - name: Package
        run: |
          mkdir -p dist
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            tar -C "artifacts/$rid" -czf "dist/flashkit-md-$GITHUB_REF_NAME-$rid.tar.gz" flashkit-md flashkit-md-gui
          done
          for rid in osx-x64 osx-arm64; do
            ditto -c -k --keepParent "artifacts/$rid/FlashKit MD.app" "dist/FlashKit-MD.app-$GITHUB_REF_NAME-$rid.zip"
          done
          (cd artifacts/win-x64 && zip -q "$GITHUB_WORKSPACE/dist/flashkit-md-$GITHUB_REF_NAME-win-x64.zip" flashkit-md.exe flashkit-md-gui.exe)
          (cd dist && shasum -a 256 * > SHA256SUMS)
      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## "ver" " {found=1; next}
            /^## / && found {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "CHANGELOG.md has no section for $version — add one before tagging"
            exit 1
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file release-notes.md

  flatpak:
    # Flatpak tooling is Linux-only, so this runs after the release
    # exists and appends the bundles (and their checksums) to it.
    # max-parallel 1: both arches append to SHA256SUMS, and concurrent
    # download-append-clobber would lose one arch's line.
    needs: release
    strategy:
      max-parallel: 1
      matrix:
        include:
          - arch: x86_64
            rid: linux-x64
            runner: ubuntu-latest
          - arch: aarch64
            rid: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish ${{ matrix.rid }} and stage for the manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}" RIDS=${{ matrix.rid }} ./publish.sh
          mkdir -p artifacts/flatpak-stage
          cp "artifacts/${{ matrix.rid }}/flashkit-md" "artifacts/${{ matrix.rid }}/flashkit-md-gui" artifacts/flatpak-stage/
      - name: Install flatpak-builder and runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --default-branch=stable --repo=flatpak-repo flatpak-build \
            packaging/flatpak/io.github.jfryman.FlashKitMD.yml
          flatpak build-bundle flatpak-repo "flashkit-md-$GITHUB_REF_NAME-${{ matrix.arch }}.flatpak" io.github.jfryman.FlashKitMD stable
      - name: Upload bundle to release and update SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" -p SHA256SUMS -O SHA256SUMS
          shasum -a 256 "flashkit-md-$GITHUB_REF_NAME-${{ matrix.arch }}.flatpak" >> SHA256SUMS
          gh release upload "$GITHUB_REF_NAME" "flashkit-md-$GITHUB_REF_NAME-${{ matrix.arch }}.flatpak" SHA256SUMS --clobber
