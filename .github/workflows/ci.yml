name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore flashkit-md.sln
      - name: Build
        run: dotnet build flashkit-md.sln --no-restore -c Release -warnaserror
      - name: Test
        run: dotnet test flashkit-md.sln --no-build -c Release

  publish:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64, osx-x64, osx-arm64, win-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish ${{ matrix.rid }}
        run: RIDS=${{ matrix.rid }} ./publish.sh
      - uses: actions/upload-artifact@v4
        with:
          name: flashkit-md-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}/

  flatpak:
    # Exercises the Flatpak manifest on every push so it cannot rot
    # between releases; the release workflow builds the shipping bundle.
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish linux-x64
        run: RIDS=linux-x64 ./publish.sh
      - name: Install flatpak-builder and runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --repo=flatpak-repo flatpak-build \
            packaging/flatpak/io.github.jfryman.FlashKitMD.yml
          flatpak build-bundle flatpak-repo flashkit-md-x86_64.flatpak io.github.jfryman.FlashKitMD
      - uses: actions/upload-artifact@v4
        with:
          name: flashkit-md-flatpak-x86_64
          path: flashkit-md-x86_64.flatpak
