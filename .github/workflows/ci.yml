name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore flashkit-md.sln
      - name: Build
        run: dotnet build flashkit-md.sln --no-restore -c Release -warnaserror
      - name: Test
        run: dotnet test flashkit-md.sln --no-build -c Release

  publish:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64, osx-x64, osx-arm64, win-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish ${{ matrix.rid }}
        run: RIDS=${{ matrix.rid }} ./publish.sh
      - uses: actions/upload-artifact@v4
        with:
          name: flashkit-md-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}/

  flatpak:
    # Exercises the Flatpak manifest on every push so it cannot rot
    # between releases; the release workflow builds the shipping bundles.
    # aarch64 builds natively on GitHub's arm64 runners — no qemu.
    needs: ci
    strategy:
      matrix:
        include:
          - arch: x86_64
            rid: linux-x64
            runner: ubuntu-latest
          - arch: aarch64
            rid: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish ${{ matrix.rid }} and stage for the manifest
        run: |
          RIDS=${{ matrix.rid }} ./publish.sh
          mkdir -p artifacts/flatpak-stage
          cp "artifacts/${{ matrix.rid }}/flashkit-md" "artifacts/${{ matrix.rid }}/flashkit-md-gui" artifacts/flatpak-stage/
      - name: Install flatpak-builder and runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --default-branch=stable --repo=flatpak-repo flatpak-build \
            packaging/flatpak/io.github.jfryman.FlashKitMD.yml
          flatpak build-bundle flatpak-repo "flashkit-md-${{ matrix.arch }}.flatpak" io.github.jfryman.FlashKitMD stable
      - uses: actions/upload-artifact@v4
        with:
          name: flashkit-md-flatpak-${{ matrix.arch }}
          path: flashkit-md-${{ matrix.arch }}.flatpak
